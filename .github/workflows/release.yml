name: Release

# On every push to main, read the version from package.json. If a matching
# vX.Y.Z tag does not yet exist, create the tag and a GitHub release. Release
# notes are taken from the matching section of CHANGELOG.md when present.

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check whether the tag already exists
        id: check
        run: |
          tag="v${{ steps.pkg.outputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $tag already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from CHANGELOG.md
        if: steps.check.outputs.exists == 'false'
        id: notes
        run: |
          version="${{ steps.pkg.outputs.version }}"
          notes_file="$(mktemp)"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$version" '
              $0 ~ "^## \\[" ver "\\]" { capture=1; next }
              capture && /^## \[/ { exit }
              capture { print }
            ' CHANGELOG.md > "$notes_file"
          fi
          if [ ! -s "$notes_file" ]; then
            echo "Release v$version" > "$notes_file"
          fi
          echo "path=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create tag and release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.pkg.outputs.version }}"
          # Pin the tag to the pushed commit. Without this the Releases API
          # defaults target_commitish to the repo's default branch, which here
          # is not `main` — that tagged old code as a new release.
          target_commitish: ${{ github.sha }}
          name: "v${{ steps.pkg.outputs.version }}"
          body_path: ${{ steps.notes.outputs.path }}
          make_latest: "true"
          files: dist/lovelace-card-pack.js
